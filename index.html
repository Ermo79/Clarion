// ── Categories ────────────────────────────────────────────────────────────────
const CATS=[
{id:"characters", label:"Characters", icon:"◈",color:"#8B6F5E"},
{id:"locations", label:"Locations", icon:"◎",color:"#5E7A6F"},
{id:"events", label:"Events", icon:"◇",color:"#6F6B8B"},
{id:"factions", label:"Factions", icon:"◉",color:"#8B7A5E"},
{id:"lore", label:"Lore & Magic", icon:"✦",color:"#5E6F8B"},
{id:"manuscripts",label:"Manuscripts", icon:"☰",color:"#7A5E8B"},
{id:"cosmology", label:"Cosmology & Taxonomy",icon:"⊕",color:"#6F8B5E"},
];
const CAT_FIELDS={
characters: ["Full Name","Aliases","Role","Affiliation","Physical Description","Personality","Background","Abilities","Relationships","Arc Notes"],
locations: ["Name","Region","Type","Description","Significance","Inhabitants","Connected Locations","Historical Notes"],
events: ["Name","Date/Era","Location","Participants","Summary","Causes","Consequences","Related Entries"],
factions: ["Name","Type","Leader","Goals","Methods","Members","Rivals","History","Symbols"],
lore: ["Term","Category","Origin","Description","Rules/Limitations","Known Practitioners","Related Lore"],
manuscripts:["Title","Author","Era","Type","Synopsis","Significance","Key Passages","Provenance"],
cosmology: ["Term","Domain","Classification","Description","Hierarchy","Relations","Examples"],
};
const FILE_TYPES={
text: {exts:[".txt",".md",".rtf",".csv",".tsv"],label:"Text", icon:"☰",color:"#5E7A6F"},
docx: {exts:[".docx"], label:"Word Doc", icon:"W",color:"#2B5797"},
xlsx: {exts:[".xlsx",".xls",".ods"], label:"Spreadsheet",icon:"⊞",color:"#1D6F42"},
image:{exts:[".jpg",".jpeg",".png",".gif",".webp",".bmp",".tiff"],label:"Image",icon:"◧",color:"#8B5E3C"},
pdf: {exts:[".pdf"], label:"PDF", icon:"P",color:"#B7001E"},
};
const ALL_EXTS=Object.values(FILE_TYPES).flatMap(d=>d.exts).join(",");

// ── Storage ───────────────────────────────────────────────────────────────────
const store={
get:(k)=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};

// ── File helpers ──────────────────────────────────────────────────────────────
function detectFT(name){
const l=(name||"").toLowerCase();
for(const[k,d]of Object.entries(FILE_TYPES))if(d.exts.some(e=>l.endsWith(e)))return k;
return null;
}
async function parseText(f){return{type:"text",content:(await f.text()).slice(0,16000)};}
async function parseDocx(f){
const ab=await f.arrayBuffer();
const r=await mammoth.extractRawText({arrayBuffer:ab});
return{type:"text",content:(r.value||"").slice(0,16000)};
}
async function parseXlsx(f){
const ab=await f.arrayBuffer();
const wb=XLSX.read(ab,{type:"array"});
const parts=wb.SheetNames.map(n=>{const csv=XLSX.utils.sheet_to_csv(wb.Sheets[n]);return csv.trim()?`## ${n}\n${csv}`:null}).filter(Boolean);
return{type:"text",content:parts.join("\n\n").slice(0,16000)};
}
async function parsePdf(f){
return new Promise((res,rej)=>{
const r=new FileReader();
r.onload=async()=>{
try{
const lib=window["pdfjs-dist/build/pdf"];
if(!lib)throw new Error("pdf.js not ready, try again in a moment");
lib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
const pdf=await lib.getDocument({data:new Uint8Array(r.result)}).promise;
const pages=[];
for(let i=1;i<=Math.min(pdf.numPages,30);i++){
const pg=await pdf.getPage(i);
const tc=await pg.getTextContent();
pages.push(tc.items.map(s=>s.str).join(" "));
}
res({type:"text",content:pages.join("\n\n").slice(0,16000)});
}catch(e){rej(new Error("PDF failed: "+e.message));}
};
r.onerror=rej;
r.readAsArrayBuffer(f);
});
}
async function parseImage(f){
return new Promise((res,rej)=>{
const r=new FileReader();
r.onload=()=>res({type:"image",base64:r.result.split(",")[1],mediaType:f.type||"image/jpeg"});
r.onerror=rej;
r.readAsDataURL(f);
});
}
async function parseFile(f){
const ft=detectFT(f.name);
if(!ft)throw new Error(`Unsupported format: "${f.name}"`);
if(ft==="text") return parseText(f);
if(ft==="docx") return parseDocx(f);
if(ft==="xlsx") return parseXlsx(f);
if(ft==="pdf") return parsePdf(f);
if(ft==="image")return parseImage(f);
}

// ── Utility Functions ─────────────────────────────────────────────────────────
const levenshteinDistance=(a,b)=>{const m=a.length,n=b.length;const d=Array(m+1).fill(0).map(()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){const cost=a[i-1]===b[j-1]?0:1;d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+cost);}return d[m][n];};

const fuzzyMatch=(str1,str2)=>{const dist=levenshteinDistance(str1.toLowerCase(),str2.toLowerCase());const maxLen=Math.max(str1.length,str2.length);return 1-(dist/maxLen);};

const extractJSON=(text)=>{text=text.trim();let start=-1;let braceCount=0;for(let i=0;i<text.length;i++){if(text[i]==="{"&&start===-1){start=i;}if(start!==-1){if(text[i]==="{")braceCount++;if(text[i]==="}"){braceCount--;if(braceCount===0){return text.slice(start,i+1);}}}}return null;};

const cleanFieldValue=(val)=>{if(typeof val!=="string")return val;return val.trim().replace(/^\s+/gm,"");};

const normalizeEntry=(entry)=>{if(!entry)return entry;const normalized={...entry};if(normalized.fields){for(const key of Object.keys(normalized.fields)){normalized.fields[key]=cleanFieldValue(normalized.fields[key]);}normalized.title=cleanFieldValue(normalized.title||"");normalized.summary=cleanFieldValue(normalized.summary||"");if(normalized.tags){normalized.tags=normalized.tags.map(t=>cleanFieldValue(t));}}return normalized;};

// ── Groq API ──────────────────────────────────────────────────────────────────
const GROQ_URL="https://api.groq.com/openai/v1/chat/completions";
const GROQ_MODEL="llama-3.3-70b-versatile";
const API_BASE_URL="http://localhost:3001";
const SYS=`You are an archivist for the novel "Bells of Memory." Extract structured information and return ONLY a valid JSON object — no explanation, no markdown fences, nothing before or after the JSON.

Shape:
{"suggestedCategory":"characters","title":"Name","fields":{"Field":"value"},"summary":"1-2 sentence wiki summary.","tags":["tag1","tag2"]}

suggestedCategory must be one of: characters, locations, events, factions, lore, manuscripts, cosmology
Preserve all proper nouns exactly. Be thorough.`;

const GLOSSARY_SYS=`You are an archivist extracting glossary terms for the novel "Bells of Memory." This is a glossary document. Extract ALL glossary entries and return ONLY valid JSON with this structure:
{"entries":[{"title":"Term Name","fields":{"Definition":"The definition text","Category":"thematic category if any"},"suggestedCategory":"lore","summary":"1 sentence about this term","tags":["tag1"]}]}

Create one entry per glossary term. Include all terms from the document.`;

const DETECT_SYS=`Analyze this document and identify distinct articles, chapters, or entries that should be separate archive entries. Return ONLY valid JSON:
{"entryCount":number,"entries":[{"title":"article title","description":"1 sentence summary","startChar":number,"endChar":number,"category":"suggested category"}]}
Categories: characters, locations, events, factions, lore, manuscripts, cosmology`;

async function extractGlossary(content,apiKey){
const textContent=content.content||"";
const prompt=`You are an expert at extracting glossary entries. Extract each distinct glossary term and its definition as a separate entry. Return ONLY valid JSON:
{"entries":[{"title":"Term","fields":{"Definition":"text"},"suggestedCategory":"lore","summary":"brief summary","tags":["glossary"]}]}
Extract all terms from:\n\n${textContent.slice(0,14000)}`;
const messages=[{role:"user",content:prompt}];
const res=await fetch(GROQ_URL,{
method:"POST",
headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
body:JSON.stringify({model:GROQ_MODEL,messages,temperature:0.1,max_tokens:2500}),
});
const data=await res.json();
if(data.error)throw new Error("Glossary extraction failed: "+(data.error.message||JSON.stringify(data.error)));
const raw=(data.choices?.[0]?.message?.content||"").trim();
const jsonStr=extractJSON(raw);
if(!jsonStr)return[];
try{const result=JSON.parse(jsonStr);return Array.isArray(result.entries)?result.entries:[];}catch(e){return[];}
}

async function extractWithGroq(content,apiKey){
let messages;
if(content.type==="image"){
messages=[{role:"user",content:[
{type:"image_url",image_url:{url:`data:${content.mediaType};base64,${content.base64}`}},
{type:"text",text:"Extract all world-building, character, location, lore or narrative information from this image for the Bells of Memory archive. Return ONLY the JSON object."}
]}];
} else {
messages=[{role:"user",content:`Extract archive entry from this content:\n\n${String(content.content||"").slice(0,12000)}`}];
}
const allMessages=[{role:"system",content:SYS},...messages];
const res=await fetch(GROQ_URL,{
method:"POST",
headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
body:JSON.stringify({model:GROQ_MODEL,messages:allMessages,temperature:0.1,max_tokens:1200}),
});
const data=await res.json();
if(data.error)throw new Error("Groq: "+(data.error.message||JSON.stringify(data.error)));
const raw=(data.choices?.[0]?.message?.content||"").trim();
const jsonStr=extractJSON(raw);
if(!jsonStr)throw new Error("No valid JSON found in response: "+raw.slice(0,200));
try{const parsed=JSON.parse(jsonStr);return normalizeEntry(parsed);}catch(e){throw new Error("Invalid JSON in response: "+e.message);}
}

// ── Multi-Entry Detection ──────────────────────────────────────────────────────
async function detectEntriesInContent(content,apiKey){
if(content.type==="image") return [{type:"text",content:"Image",startChar:0,endChar:5}];
const textContent=content.content||"";
const messages=[{role:"user",content:`You are an expert at identifying separate documents, chapters, or articles within longer texts. Analyze this document carefully and identify each distinct article or entry that should be saved separately.\n\nReturn ONLY a valid JSON object with this exact structure:\n{"entryCount":2,"entries":[{"title":"Article 1","description":"Summary","startChar":0,"endChar":500,"category":"lore"},{"title":"Article 2","description":"Summary","startChar":501,"endChar":1000,"category":"lore"}]}\n\nDocument to analyze:\n\n${textContent.slice(0,14000)}`}];
const res=await fetch(GROQ_URL,{
method:"POST",
headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
body:JSON.stringify({model:GROQ_MODEL,messages,temperature:0.1,max_tokens:1500}),
});
const data=await res.json();
if(data.error)throw new Error("Detection failed: "+(data.error.message||JSON.stringify(data.error)));
const raw=(data.choices?.[0]?.message?.content||"").trim();
const jsonStr=extractJSON(raw);
if(!jsonStr){
console.error("No JSON in detection response:",raw.slice(0,300));
throw new Error("Groq did not return structured data. Try 'Extract Entry' instead.");
}
try{const detected=JSON.parse(jsonStr);const entries=detected.entries||[];if(!Array.isArray(entries)||entries.length===0)throw new Error("No entries found");return entries;}catch(e){console.error("Detection parse error:",e);throw new Error("Detection failed: "+e.message);}
}

// ── Deduplication & Merging ────────────────────────────────────────────────────
function findMatchingEntry(newEntry,existingEntries){
if(!existingEntries.length)return{match:null,confidence:0};
let bestMatch=null;let bestScore=0;
for(const existing of existingEntries){
const score=fuzzyMatch(newEntry.title,existing.title);
if(score>0.8&&score>bestScore){bestScore=score;bestMatch=existing;}
}
return{match:bestMatch,confidence:bestScore};
}

async function smartMergeEntries(newEntry,existingEntry,sourceFile,apiKey){
const timestamp=new Date().toISOString();
const changes={};const conflicts=[];
const allFields=new Set([...Object.keys(newEntry.fields||{}),...Object.keys(existingEntry.fields||{})]);
for(const field of allFields){
const newVal=newEntry.fields?.[field]||"";const oldVal=existingEntry.fields?.[field]||"";
if(!newVal&&!oldVal)continue;
if(!oldVal){changes[field]={old:null,new:newVal,status:"added"};}
else if(!newVal){changes[field]={old:oldVal,new:null,status:"unchanged"};}
else if(oldVal===newVal){changes[field]={old:oldVal,new:newVal,status:"unchanged"};}
else{
const conflict=await checkComplement(oldVal,newVal,apiKey);
if(conflict.isComplementary){
const merged=oldVal+"\n\n"+newVal;
changes[field]={old:oldVal,new:merged,status:"appended"};
}else{
conflicts.push({fieldName:field,oldValue:oldVal,newValue:newVal,recommendation:"review"});
changes[field]={old:oldVal,new:newVal,status:"conflict"};
}
}
}
const editEntry={timestamp,source:{filename:sourceFile,uploadDate:new Date().toLocaleDateString()},changes,conflicts};
const merged={...existingEntry,lastModified:timestamp};
for(const[field,change]of Object.entries(changes)){
if(change.status!=="unchanged"&&change.new!==null&&change.new!==""){
merged.fields[field]=change.new;
}
}
merged.editHistory=merged.editHistory||[];merged.editHistory.push(editEntry);merged.tags=[...new Set([...(merged.tags||[]),...(newEntry.tags||[])])];
return{entry:merged,editEntry,conflicts};
}

async function checkComplement(oldVal,newVal,apiKey){
const prompt=`Are these two descriptions of the same thing complementary (both describing different aspects) or contradictory (conflicting information)?\n\nOLD: "${oldVal}"\n\nNEW: "${newVal}"\n\nRespond with ONLY: "complementary" or "contradictory"`;
const messages=[{role:"user",content:prompt}];
try{
const res=await fetch(GROQ_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},body:JSON.stringify({model:GROQ_MODEL,messages,temperature:0,max_tokens:10})});
const data=await res.json();
if(data.error)return{isComplementary:true,analysis:"(defaulted to complementary)"};
const response=(data.choices?.[0]?.message?.content||"").toLowerCase().trim();
return{isComplementary:!response.includes("contradictory"),analysis:response};
}catch(e){return{isComplementary:true,analysis:"(defaulted to complementary due to error)"};}
}

async function processMultipleEntries(newEntries,existingEntries,sourceFile,apiKey){
const created=[],updated=[],conflictList=[];
for(const newEntry of newEntries){
const{match,confidence}=findMatchingEntry(newEntry,existingEntries);
if(match&&confidence>0.8){
const{entry:merged,conflicts}=await smartMergeEntries(newEntry,match,sourceFile,apiKey);
updated.push(merged);if(conflicts.length>0)conflictList.push({entry:merged,conflicts});
}else{
const newId=Date.now().toString()+Math.random().toString(36).slice(2,9);
const entry={...newEntry,id:newId,sourceFile,createdAt:new Date().toISOString(),lastModified:new Date().toISOString(),editHistory:[{timestamp:new Date().toISOString(),source:{filename:sourceFile,uploadDate:new Date().toLocaleDateString()},changes:Object.entries(newEntry.fields||{}).reduce((acc,[k,v])=>({...acc,[k]:{old:null,new:v,status:"added"}}),{}),conflicts:[]}]};
created.push(entry);
}
}
return{created,updated,conflicts:conflictList};
}

// ── Markdown Export ───────────────────────────────────────────────────────────
function generateChangelogMarkdown(entry){
if(!entry.editHistory||entry.editHistory.length===0)return"";
let md="## Edit History\n\n";
for(const edit of entry.editHistory){
const date=new Date(edit.timestamp).toLocaleDateString();
const source=edit.source?.filename||"Unknown source";
md+=`### ${date} from ${source}\n`;
if(Object.keys(edit.changes||{}).length>0){
for(const[field,change]of Object.entries(edit.changes)){
if(change.status==="added")md+=`- **${field}**: Added\n`;
else if(change.status==="appended")md+=`- **${field}**: Updated with new information\n`;
else if(change.status==="conflict")md+=`- **${field}**: ⚠️ Conflicting information (review needed)\n`;
}
}
if(edit.conflicts&&edit.conflicts.length>0){
md+="\n**⚠️ Conflicts Found:**\n";
for(const conflict of edit.conflicts){
md+=`- ${conflict.fieldName}: "${conflict.oldValue}" vs "${conflict.newValue}"\n`;
}
}
md+="\n";
}
return md;
}

function entryToMarkdown(entry){
const cat=CATS.find(c=>c.id===entry.category);
let md=`# ${entry.title}\n\n`;
md+=`**Category**: ${cat?.label||entry.category}\n`;
if(entry.tags&&entry.tags.length>0)md+=`**Tags**: ${entry.tags.join(", ")}\n`;
md+=`**Created**: ${new Date(entry.createdAt).toLocaleDateString()}\n`;
md+=`**Last Modified**: ${new Date(entry.lastModified||entry.createdAt).toLocaleDateString()}\n`;
if(entry.sourceFile)md+=`**Source**: ${entry.sourceFile}\n`;
md+="\n";
if(entry.summary){md+=`## Summary\n${entry.summary}\n\n`;}
if(entry.fields&&Object.keys(entry.fields).length>0){
md+="## Fields\n\n";
for(const[field,content]of Object.entries(entry.fields)){
if(content)md+=`### ${field}\n${content}\n\n`;
}
}
const changelog=generateChangelogMarkdown(entry);
if(changelog)md+=`---\n\n${changelog}`;
return md;
}

async function saveEntryToBackend(entry,apiKey){
try{
const markdown=entryToMarkdown(entry);
const res=await fetch(`${API_BASE_URL}/api/entries/save`,{
method:"POST",headers:{"Content-Type":"application/json","X-API-Key":apiKey},body:JSON.stringify({entry,markdown}),});
const data=await res.json();
if(!res.ok)throw new Error(data.error||"Failed to save");
return{success:true,path:data.path};
}catch(e){
throw new Error(`Backend save failed: ${e.message}`);
}
}

async function exportEntriesToBackend(entries,apiKey){
try{
const exportData=entries.map(entry=>({entry,markdown:entryToMarkdown(entry)}));
const res=await fetch(`${API_BASE_URL}/api/entries/export`,{
method:"POST",headers:{"Content-Type":"application/json","X-API-Key":apiKey},body:JSON.stringify({entries:exportData}),});
const data=await res.json();
if(!res.ok)throw new Error(data.error||"Export failed");
return{success:true,count:data.count,files:data.files};
}catch(e){
throw new Error(`Backend export failed: ${e.message}`);
}
}

function Tag({label,color}){

function Badge({ft}){
if(!ft)return null;
const d=FILE_TYPES[ft];
return <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:2,fontSize:11,background:d.color+"15",color:d.color,border:`1px solid ${d.color}44`,fontFamily:"'Courier New',monospace"}}>{d.icon} {d.label} detected</span>;
}
function UploadZone({onFile,compact}){
const [drag,setDrag]=useState(false);
const ref=useRef();
return(
<div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer?.files[0];if(f)onFile(f);}}
onClick={()=>ref.current.click()}
style={{border:`2px dashed ${drag?"#8B6F5E":"#C8C0B4"}`,borderRadius:3,padding:compact?"14px":"24px 16px",textAlign:"center",cursor:"pointer",background:drag?"#F5EDE4":"#FDFCFA",transition:"all .15s"}}>
<input ref={ref} type="file" style={{display:"none"}} accept={ALL_EXTS} onChange={e=>{if(e.target.files[0])onFile(e.target.files[0]);e.target.value="";}}/>
<div style={{fontSize:compact?18:26,color:"#C8B89A",marginBottom:5}}>↑</div>
<div style={{fontFamily:"'Palatino Linotype',serif",fontSize:compact?13:15,color:"#5C4E42",marginBottom:4}}>{compact?"Drop a file or click":"Drop any file here, or click to browse"}</div>
<div style={{fontFamily:"'Courier New',monospace",fontSize:9,color:"#A09080",lineHeight:1.9}}>.docx · .xlsx · .pdf · .txt · .md · .csv<br/>.jpg · .png · .gif · .webp</div>
</div>
);
}

// ── API Key Setup Screen ──────────────────────────────────────────────────────
function Dashboard({apiKey,onEnter,onSaveKey}){
const entries=store.get("clarion_entries")||[];
const [username,setUsername]=useState(()=>store.get("clarion_user")||"");
const [nameInput,setNameInput]=useState("");
const [apiInput,setApiInput]=useState("");
const [apiErr,setApiErr]=useState("");
const [testing,setTesting]=useState(false);
const [showApiForm,setShowApiForm]=useState(false);

const totalEntries=entries.length;
const catCounts=CATS.map(c=>({...c,count:entries.filter(e=>e.category===c.id).length}));
const sources=[...new Set(entries.map(e=>e.sourceFile).filter(Boolean))];
const recentEntries=entries.slice(0,3);

const handleSetName=()=>{
if(!nameInput.trim())return;
store.set("clarion_user",nameInput.trim());
setUsername(nameInput.trim());
setNameInput("");
};

const handleConnectKey=async()=>{
if(!apiInput.trim()){setApiErr("Please paste your Groq API key.");return;}
setTesting(true);setApiErr("");
try{
const res=await fetch(GROQ_URL,{method:"POST",
headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiInput.trim()}`},
body:JSON.stringify({model:GROQ_MODEL,messages:[{role:"user",content:"OK"}],max_tokens:3})});
const d=await res.json();
if(d.error)throw new Error(d.error.message);
onSaveKey(apiInput.trim());
setShowApiForm(false);

// ── Extract Modal ─────────────────────────────────────────────────────────────
function ExtractModal({onClose,onSave,onSaveMultiple,onMergeConflicts,apiKey,existingEntries=[],initialParsed=null,sourceFileName=""}){
const [raw,setRaw]=useState(initialParsed?.type==="text"?initialParsed.content:"");
const [parsed,setParsed]=useState(initialParsed);
const [fileName,setFileName]=useState(sourceFileName);
const [ft,setFt]=useState(initialParsed?detectFT(sourceFileName):null);
const [status,setStatus]=useState(initialParsed?"ready":"idle");
const [extracted,setExtracted]=useState(null);
const [detectedEntries,setDetectedEntries]=useState([]);
const [editedCat,setEditedCat]=useState("");
const [editedFields,setEditedFields]=useState({});
const [selectedEntries,setSelectedEntries]=useState({});
const [err,setErr]=useState("");

const handleFile=async(f)=>{
setErr("");setStatus("parsing");setFileName(f.name);setFt(detectFT(f.name));
try{const p=await parseFile(f);setParsed(p);if(p.type==="text")setRaw(p.content);else setRaw("");setStatus("ready");}
catch(e){setErr("Could not parse file: "+e.message);setStatus("idle");}
};

const handleDetectMultiple=async()=>{
setStatus("detecting");setErr("");
try{
const src=(parsed?.type==="image")?{type:"text",content:raw}:(parsed||{type:"text",content:raw});
if(src.type==="text"&&!src.content?.trim()){setErr("Please add content before detecting entries.");setStatus("error");return;}
const detected=await detectEntriesInContent(src,apiKey);
setDetectedEntries(detected);
const selected={};detected.forEach((_,idx)=>{selected[idx]=true;});
setSelectedEntries(selected);
setStatus("detect-review");
}catch(e){
setErr(e.message||"Detection failed. Try using 'Extract Entry' instead to process the document as a single entry.");
setStatus("error");
}
};

const handleExtractDetected=async()=>{
setStatus("loading");setErr("");
try{
const selected=Object.entries(selectedEntries).filter(([_,v])=>v).map(([k])=>parseInt(k));
if(selected.length===0){setErr("Select at least one entry.");setStatus("detect-review");return;}
const textContent=parsed?.content||raw;
const extractedEntries=[];
for(const idx of selected){
const entry=detectedEntries[idx];
const start=entry.startChar;const end=entry.endChar;
const segment=textContent.slice(start,end);
const result=await extractWithGroq({type:"text",content:segment},apiKey);
extractedEntries.push(result);
}
const{created,updated,conflicts}=await processMultipleEntries(extractedEntries,existingEntries,fileName,apiKey);
if(conflicts.length>0){
onMergeConflicts({created,updated,conflicts,entries:[...created,...updated]});
onClose();
}else{
onSaveMultiple([...created,...updated]);
onClose();
}
}catch(e){setErr(e.message||"Unknown error");setStatus("error");}
};

const handleExtract=async()=>{
setStatus("loading");setErr("");
try{
const src=(parsed?.type==="image")?{type:"text",content:raw}:(parsed||{type:"text",content:raw});
if(src.type==="text"&&!src.content?.trim()){
setErr("Please describe the image or paste some text before extracting.");
setStatus("error");return;
}
const result=await extractWithGroq(src,apiKey);
setExtracted(result);
setEditedCat(result.suggestedCategory||"characters");
setEditedFields(result.fields||{});
setStatus("review");
}catch(e){setErr(e.message||"Unknown error");setStatus("error");}
};

const handleExtractGlossary=async()=>{
setStatus("loading");setErr("");
try{
const src=parsed||{type:"text",content:raw};
if(!src.content?.trim()){
setErr("Please paste glossary content before extracting.");
setStatus("error");return;
}
const entries=await extractGlossary(src,apiKey);
if(!entries||entries.length===0){setErr("No glossary entries found");setStatus("error");return;}
const{created,updated,conflicts}=await processMultipleEntries(entries,existingEntries,fileName,apiKey);
if(conflicts.length>0){
onMergeConflicts({created,updated,conflicts,entries:[...created,...updated]});
onClose();
}else{
onSaveMultiple([...created,...updated]);
onClose();
}
}catch(e){setErr(e.message||"Glossary extraction failed");setStatus("error");}
};

const handleSave=()=>{
onSave({id:Date.now().toString(),category:editedCat,title:extracted.title,summary:extracted.summary,fields:editedFields,tags:extracted.tags||[],sourceFile:fileName||null,createdAt:new Date().toISOString(),editHistory:[],lastModified:new Date().toISOString()});
onClose();
};

const canExtract=(parsed?.type==="image"?raw.trim().length>10:null)||parsed||raw.trim().length>10;
const showInput=["idle","ready","error","parsing"].includes(status);

return(
<div style={{position:"fixed",inset:0,background:"rgba(20,14,8,0.6)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:12}}
onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
<div style={{background:"#FDFCFA",width:"min(700px,100%)",maxHeight:"92vh",overflowY:"auto",borderRadius:4,padding:"28px 28px",boxShadow:"0 8px 40px rgba(0,0,0,0.2)",border:"1px solid #E0D8CE"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
<h2 style={{margin:0,fontFamily:"'Palatino Linotype',Palatino,serif",fontSize:22,color:"#1E140A"}}>{status==="review"?"Review Entry":"Add to Archive"}</h2>
<button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#A09080"}}>✕</button>
</div>

{showInput&&<>
{ft&&<div style={{marginBottom:14,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}><Badge ft={ft}/><span style={{fontSize:11,color:"#8A7A6A",fontFamily:"'Courier New',monospace",wordBreak:"break-all"}}>{fileName}</span></div>}
<UploadZone onFile={handleFile}/>
{parsed?.type==="image"?(
<>
<div style={{padding:"12px 14px",background:"#F0EBE3",borderRadius:3,border:"1px solid #DDD5C8",fontSize:13,color:"#5C4E42",lineHeight:1.6,marginBottom:10}}>
🖼 <strong>{fileName}</strong> loaded.
</div>
<label style={{...LS,marginBottom:6}}>Describe this image for the archive</label>
<textarea value={raw} onChange={e=>setRaw(e.target.value)}
placeholder="e.g. Character sketch of a tall woman with silver-streaked hair wearing a burgundy cloak. She holds a bell. Notes around the margin read: 'Keeper of the Third Gate, circa 1340 AD'…"
style={{...IS,minHeight:160,resize:"vertical"}}/>
<p style={{fontSize:11,color:"#A09080",fontFamily:"'Courier New',monospace",marginTop:6}}>Type a description of what's in the image, then click Extract Entry.</p>
</>
):(
<>
<div style={{textAlign:"center",fontSize:11,color:"#B0A090",fontFamily:"'Courier New',monospace",margin:"12px 0 8px"}}>— or paste / type text below —</div>
<textarea value={raw} onChange={e=>{setRaw(e.target.value);if(e.target.value)setParsed(null);}}
placeholder="Paste notes, manuscript excerpts, character sketches, lore, spreadsheet data, or a Google Docs export…"
style={{...IS,minHeight:150,resize:"vertical"}}/>
</>
)}
{status==="parsing"&&<p style={{textAlign:"center",color:"#8A7A6A",fontStyle:"italic",marginTop:10,fontSize:13}}>Parsing file…</p>}

const u=[...es,...entries];setEntries(u);store.set("clarion_entries",u);
};
const deleteEntry=id=>{const u=entries.filter(e=>e.id!==id);setEntries(u);store.set("clarion_entries",u);setSelected(null);};

try{const p=await parseFile(f);setPayload({parsed:p,fileName:f.name});setModal("extract");}
catch(e){alert(`Could not read "${f.name}":\n${e.message}`);}
};

const handleMergeConflicts=(data)=>{
setConflictData(data);setModal("conflicts");
};

const handleSaveWithConflictResolution=(resolved)=>{
const{created,updated}=resolved;saveMultipleEntries([...created,...updated]);setModal(null);setConflictData(null);
};

const handleOpenSettings=()=>{setModal("settings");};
const handleSaveSettings=(newKey)=>{saveKey(newKey);};
const handleOpenModel=()=>{setModal("model");};
const handleSaveModel=(m)=>{store.set("clarion_model",m);setGroqModel(m);};

const [entered,setEntered]=useState(false);
if(!entered) return <Dashboard apiKey={apiKey} onEnter={()=>setEntered(true)} onSaveKey={saveKey}/>;

const filtered=entries.filter(e=>{
if(activeCat!=="all"&&e.category!==activeCat)return false;
const q=search.toLowerCase();
return !q||e.title.toLowerCase().includes(q)||e.summary?.toLowerCase().includes(q)||e.tags?.some(t=>t.toLowerCase().includes(q));
});
const counts={};
CATS.forEach(c=>{counts[c.id]=entries.filter(e=>e.category===c.id).length;});

return(

<input ref={fileRef} type="file" style={{display:"none"}} accept={ALL_EXTS} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value="";}}/>
<button onClick={()=>fileRef.current.click()} style={{padding:"5px 12px",background:"none",border:"1px solid #5A4A3A",borderRadius:2,color:"#C8B89A",cursor:"pointer",fontFamily:"'Courier New',monospace",fontSize:10}}>↑ Upload</button>
<button onClick={()=>{setPayload(null);setModal("extract");}} style={{padding:"5px 12px",background:"none",border:"1px solid #5A4A3A",borderRadius:2,color:"#C8B89A",cursor:"pointer",fontFamily:"'Courier New',monospace",fontSize:10}}>✦ Extract</button>
<button onClick={()=>setModal("manual")} style={{padding:"5px 12px",background:"#C8A87A",border:"none",borderRadius:2,color:"#1E140A",cursor:"pointer",fontFamily:"'Courier New',monospace",fontSize:10,fontWeight:700}}>+ New</button>
<SettingsMenu onOpenApiKeys={handleOpenSettings} onOpenModel={handleOpenModel} currentModel={groqModel}/>
</div>
</div>
</header>

<div style={{maxWidth:1100,margin:"0 auto",display:"flex",minHeight:"calc(100vh - 56px)"}}>

{/* Sidebar */}
<aside style={{width:190,flexShrink:0,padding:"20px 0",borderRight:"1px solid #E0D8CE"}}>
<div style={{padding:"0 14px 8px",fontSize:9,textTransform:"uppercase",letterSpacing:"0.12em",color:"#A09080",fontFamily:"'Courier New',monospace"}}>Categories</div>
{[{id:"all",label:"All Entries",icon:"",color:"#8B6F5E",count:entries.length},...CATS.map(c=>({...c,count:counts[c.id]||0}))].map(c=>(
<div key={c.id} onClick={()=>setActiveCat(c.id)}
style={{padding:"7px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",background:activeCat===c.id?"#EDE6DC":"none",borderRight:activeCat===c.id?`2px solid ${c.color}`:"2px solid transparent"}}>
<span style={{fontSize:13,color:activeCat===c.id?"#2C2218":"#6B5E52",fontFamily:"Georgia,serif"}}>
{c.icon&&<span style={{marginRight:5,color:c.color}}>{c.icon}</span>}{c.label}
</span>
<span style={{fontSize:10,color:"#A09080",fontFamily:"'Courier New',monospace"}}>{c.count}</span>
</div>
))}
<div style={{padding:"16px 12px 0",marginTop:14,borderTop:"1px solid #E0D8CE"}}>
<div style={{fontSize:9,textTransform:"uppercase",letterSpacing:"0.1em",color:"#A09080",fontFamily:"'Courier New',monospace",marginBottom:8}}>Quick Drop</div>
<UploadZone onFile={handleFile} compact/>
</div>
</aside>

{/* Main */}
<main style={{flex:1,padding:"20px 24px"}}>
<div style={{marginBottom:16,position:"relative"}}>
<span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#A09080",fontSize:14}}>⌕</span>
<input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search the archive…"
style={{width:"100%",padding:"9px 12px 9px 30px",border:"1px solid #D8D0C8",borderRadius:3,fontSize:13,fontFamily:"Georgia,serif",background:"#FDFCFA",color:"#2C2218",boxSizing:"border-box"}}/>
</div>
<div style={{fontSize:10,color:"#A09080",fontFamily:"'Courier New',monospace",letterSpacing:"0.06em",marginBottom:12}}>
{filtered.length} {filtered.length===1?"ENTRY":"ENTRIES"}{activeCat!=="all"&&` · ${CATS.find(c=>c.id===activeCat)?.label.toUpperCase()}`}
</div>
{filtered.length===0&&(
<div style={{textAlign:"center",padding:"56px 0"}}>
<div style={{fontSize:34,marginBottom:12,color:"#C8B89A"}}>✦</div>
<p style={{fontFamily:"'Palatino Linotype',serif",fontSize:17,color:"#7A6A5A"}}>{entries.length===0?"The Clarion awaits its first entry.":"No entries match your search."}</p>
{entries.length===0&&<p style={{fontSize:13,color:"#A09080",fontStyle:"italic",marginTop:8}}>Upload a file, paste notes, or create an entry manually.</p>}
</div>
)}
{filtered.map(e=><EntryCard key={e.id} entry={e} onClick={setSelected}/>)}
</main>
</div>

{modal==="extract"&&<ExtractModal onClose={()=>{setModal(null);setPayload(null);}} onSave={saveEntry} onSaveMultiple={saveMultipleEntries} onMergeConflicts={handleMergeConflicts} apiKey={apiKey} existingEntries={entries} initialParsed={payload?.parsed||null} sourceFileName={payload?.fileName||""}/>}
{modal==="manual"&&<ManualModal onClose={()=>setModal(null)} onSave={saveEntry}/>}
{modal==="conflicts"&&conflictData&&<ConflictReviewModal onClose={()=>{setModal(null);setConflictData(null);}} onSave={handleSaveWithConflictResolution} conflicts={conflictData.conflicts} created={conflictData.created} updated={conflictData.updated}/>}
{modal==="settings"&&<SettingsModal apiKey={apiKey} onSave={handleSaveSettings} onClose={()=>setModal(null)}/>}
{modal==="model"&&<ModelModal currentModel={groqModel} onSave={handleSaveModel} onClose={()=>setModal(null)}/>}
{selected&&<EntryDetail entry={selected} onClose={()=>setSelected(null)} onDelete={deleteEntry} apiKey={apiKey}/>}
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
